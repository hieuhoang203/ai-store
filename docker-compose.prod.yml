services:
  backend:
    build:
      context: ./be-ai-store
    environment:
      NODE_ENV: production
      PORT: ${PORT:-8903}
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      REDIS_URL: ${REDIS_URL:?REDIS_URL is required}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:?TELEGRAM_BOT_TOKEN is required}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:?JWT_ACCESS_SECRET is required}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET is required}
      TELEGRAM_MINIAPP_URL: ${TELEGRAM_MINIAPP_URL:-http://localhost:0405}
      ADMIN_APP_URL: ${ADMIN_APP_URL:-http://localhost:2110}
      PAYOS_CLIENT_ID: ${PAYOS_CLIENT_ID:?PAYOS_CLIENT_ID is required}
      PAYOS_API_KEY: ${PAYOS_API_KEY:?PAYOS_API_KEY is required}
      PAYOS_CHECKSUM_KEY: ${PAYOS_CHECKSUM_KEY:?PAYOS_CHECKSUM_KEY is required}
      PAYOS_API_BASE_URL: ${PAYOS_API_BASE_URL:-https://api-merchant.payos.vn}
      PAYOS_PAYMENT_DESCRIPTION_PREFIX: ${PAYOS_PAYMENT_DESCRIPTION_PREFIX:-AI Store}
      CLOUDINARY_URL: ${CLOUDINARY_URL:?CLOUDINARY_URL is required}
      SUPPORT_NAME: ${SUPPORT_NAME:-AI Store Support}
      SUPPORT_PHONE: ${SUPPORT_PHONE:-0966628527}
      SUPPORT_TELEGRAM: ${SUPPORT_TELEGRAM:-@hieuhv203}
      SUPPORT_WORKING_TIME: ${SUPPORT_WORKING_TIME:-08:00 - 22:00 hằng ngày}
    ports:
      - "${PORT:-8903}:8903"

  frontend-admin:
    build:
      context: ./fe-ai-store
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:?NEXT_PUBLIC_API_BASE_URL is required}
    ports:
      - "${ADMIN_PORT:-2110}:2110"
    depends_on:
      - backend

  frontend-miniapp:
    build:
      context: ./frontend-miniapp
    environment:
      BACKEND_INTERNAL_URL: ${BACKEND_INTERNAL_URL:-http://backend:8903}
    ports:
      - "${MINIAPP_PORT:-0405}:405"
    depends_on:
      - backend
