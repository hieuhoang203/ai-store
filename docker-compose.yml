services:
  backend:
    build:
      context: ./be-ai-store
    env_file:
      - ./be-ai-store/.env
    ports:
      - "8903:8903"
    depends_on:
      - redis
      - minio

  frontend-admin:
    build:
      context: ./fe-ai-store
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8903
    ports:
      - "2110:2110"
    depends_on:
      - backend

  frontend-miniapp:
    build:
      context: ./frontend-miniapp
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8903
    ports:
      - "0405:405"
    depends_on:
      - backend

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:RELEASE.2026-05-13T20-59-44Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

volumes:
  minio-data:
