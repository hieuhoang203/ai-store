services:
  - type: web
    name: ai-store-backend
    runtime: node
    rootDir: be-ai-store
    buildCommand: npm ci && npx prisma migrate deploy && npm run build
    startCommand: npm run start:prod
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: TELEGRAM_MINIAPP_URL
        sync: false
      - key: ADMIN_APP_URL
        sync: false
      - key: PAYOS_CLIENT_ID
        sync: false
      - key: PAYOS_API_KEY
        sync: false
      - key: PAYOS_CHECKSUM_KEY
        sync: false
      - key: PAYOS_API_BASE_URL
        value: https://api-merchant.payos.vn
      - key: PAYOS_PAYMENT_DESCRIPTION_PREFIX
        value: AI Store
